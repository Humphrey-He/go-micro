syntax = "proto3";

package orderpb;

option go_package = "go-micro/proto/orderpb";

message Item {
  string sku_id = 1;
  int32 quantity = 2;
  int64 price = 3;
}

message CreateOrderRequest {
  string request_id = 1;
  string user_id = 2;
  repeated Item items = 3;
  string remark = 4;
}

message CreateOrderResponse {
  string order_id = 1;
  string biz_no = 2;
  string status = 3;
}

message GetOrderRequest {
  string order_id = 1;
}

message Order {
  string order_id = 1;
  string biz_no = 2;
  string user_id = 3;
  string status = 4;
  int64 total_amount = 5;
  repeated Item items = 6;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  string from_status = 2;
  string to_status = 3;
}

message SimpleResponse {
  bool success = 1;
}

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (Order);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (SimpleResponse);
}
