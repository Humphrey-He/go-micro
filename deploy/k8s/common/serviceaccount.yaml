# ServiceAccount for go-micro services
apiVersion: v1
kind: ServiceAccount
metadata:
  name: go-micro-sa
  namespace: go-micro
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: go-micro-role
  namespace: go-micro
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: go-micro-role-binding
  namespace: go-micro
subjects:
  - kind: ServiceAccount
    name: go-micro-sa
    namespace: go-micro
roleRef:
  kind: Role
  name: go-micro-role
  apiGroup: rbac.authorization.k8s.io
