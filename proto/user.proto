syntax = "proto3";

package userpb;

option go_package = "go-micro/proto/userpb";

message GetUserRequest {
  string user_id = 1;
}

message GetUserByNameRequest {
  string username = 1;
}

message GetUserByPhoneRequest {
  string phone = 1;
}

message AuthRequest {
  string username = 1;
  string password = 2;
}

message User {
  string user_id = 1;
  string username = 2;
  string role = 3;
  int32 status = 4;
  string phone = 5;
  string password_hash = 6;
}

service UserService {
  rpc GetUser(GetUserRequest) returns (User);
  rpc GetUserByName(GetUserByNameRequest) returns (User);
  rpc GetUserByPhone(GetUserByPhoneRequest) returns (User);
  rpc Authenticate(AuthRequest) returns (User);
}
