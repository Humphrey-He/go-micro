# Production Environment ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: go-micro-config
  namespace: go-micro-prod
data:
  APP_ENV: "production"

  # Redis
  REDIS_ADDR: "redis-prod:6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "50"
  REDIS_MIN_IDLE_CONNS: "10"

  # MySQL
  MYSQL_MAX_OPEN_CONNS: "100"
  MYSQL_MAX_IDLE_CONNS: "20"
  MYSQL_CONN_MAX_LIFETIME_SECONDS: "1800"

  # RabbitMQ
  MQ_EXCHANGE: "order.events"
  MQ_QUEUE: "order_reserved"
  MQ_ROUTING_KEY: "order_reserved"
  MQ_DLX: "order.events.dlx"
  MQ_DLQ: "order_reserved.dlq"

  REFUND_MQ_EXCHANGE: "refund.events"
  REFUND_MQ_QUEUE: "refund.process"
  REFUND_MQ_ROUTING_KEY: "refund.initiated"
  REFUND_MQ_DLX: "refund.events.dlx"
  REFUND_MQ_DLQ: "refund.process.dlq"

  # gRPC Targets
  ORDER_GRPC_TARGET: "order-service:9081"
  USER_GRPC_TARGET: "user-service:9083"
  INVENTORY_GRPC_TARGET: "inventory-service:9082"
  TASK_GRPC_TARGET: "task-service:9084"
  REFUND_GRPC_TARGET: "refund-service:9086"
  ACTIVITY_GRPC_TARGET: "activity-service:9087"
  PRICE_GRPC_TARGET: "price-service:9088"

  # Rate Limit
  RATE_LIMIT_QPS: "500"
  RATE_LIMIT_BURST: "1000"
---
apiVersion: v1
kind: Secret
metadata:
  name: go-micro-secret
  namespace: go-micro-prod
type: Opaque
stringData:
  MYSQL_DSN: "REPLACE_WITH_PROD_MYSQL_DSN"
  REDIS_PASSWORD: "REPLACE_WITH_PROD_REDIS_PASSWORD"
  MQ_URL: "REPLACE_WITH_PROD_MQ_URL"
  JWT_SECRET: "REPLACE_WITH_PROD_JWT_SECRET_32_PLUS_CHARS"
