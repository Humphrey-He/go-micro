# PodDisruptionBudget for go-micro services
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-api-pdb
  namespace: go-micro
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway-api
---
