syntax = "proto3";

package paymentpb;

option go_package = "go-micro/proto/paymentpb";

message Payment {
  string payment_id = 1;
  string order_id = 2;
  int64 amount = 3;
  string status = 4;
  string request_id = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

message CreatePaymentRequest {
  string order_id = 1;
  int64 amount = 2;
  string request_id = 3;
}

message CreatePaymentResponse {
  Payment payment = 1;
  bool idempotent_hit = 2;
}

message GetPaymentRequest {
  string payment_id = 1;
}

message ChangePaymentStatusRequest {
  string payment_id = 1;
}

message SimpleResponse {
  bool success = 1;
}

service PaymentService {
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc GetPayment(GetPaymentRequest) returns (Payment);

  rpc MarkSuccess(ChangePaymentStatusRequest) returns (SimpleResponse);
  rpc MarkFailed(ChangePaymentStatusRequest) returns (SimpleResponse);
  rpc MarkTimeout(ChangePaymentStatusRequest) returns (SimpleResponse);
  rpc Refund(ChangePaymentStatusRequest) returns (SimpleResponse);
}