syntax = "proto3";

package price;

option go_package = "go-micro/proto/pricepb";

service PriceService {
  rpc Calculate (CalculateRequest) returns (CalculateResponse);
  rpc History (HistoryRequest) returns (HistoryResponse);
}

message CalculateRequest {
  string sku_id = 1;
  double base_price = 2;
  double coupon_amount = 3;
  int32 user_level = 4;
}

message CalculateResponse {
  string sku_id = 1;
  double base_price = 2;
  double coupon_amount = 3;
  double level_discount = 4;
  double final_price = 5;
  string discount_reason = 6;
}

message HistoryRequest {
  string sku_id = 1;
  int32 limit = 2;
}

message History {
  string sku_id = 1;
  double old_price = 2;
  double new_price = 3;
  string reason = 4;
}

message HistoryResponse {
  repeated History items = 1;
}
