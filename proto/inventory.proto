syntax = "proto3";

package inventorypb;

option go_package = "go-micro/proto/inventorypb";

message Item {
  string sku_id = 1;
  int32 quantity = 2;
}

message ReserveRequest {
  string order_id = 1;
  repeated Item items = 2;
}

message ReserveResponse {
  string reserved_id = 1;
}

message ReleaseRequest {
  string reserved_id = 1;
}

message ReleaseByOrderRequest {
  string order_id = 1;
}

message ConfirmRequest {
  string reserved_id = 1;
}

message SimpleResponse {
  bool success = 1;
}

message GetReservationRequest {
  string order_id = 1;
}

message Reservation {
  string reserved_id = 1;
  string order_id = 2;
  string status = 3;
}

message ListInventoryRequest {}

message ListInventoryResponse {
  repeated InventoryItem items = 1;
}

message InventoryItem {
  string sku_id = 1;
  int32 available = 2;
  int32 reserved = 3;
}

service InventoryService {
  rpc Reserve(ReserveRequest) returns (ReserveResponse);
  rpc Release(ReleaseRequest) returns (SimpleResponse);
  rpc ReleaseByOrder(ReleaseByOrderRequest) returns (SimpleResponse);
  rpc Confirm(ConfirmRequest) returns (SimpleResponse);
  rpc GetReservation(GetReservationRequest) returns (Reservation);
  rpc ListInventory(ListInventoryRequest) returns (ListInventoryResponse);
}
