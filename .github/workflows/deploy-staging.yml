name: deploy-staging

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  contents: write

env:
  GO_VERSION: "1.25.x"
  GOTOOLCHAIN: auto
  REGISTRY: ghcr.io/${{ github.repository }}
  STAGING_NAMESPACE: go-micro-staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Run tests
        run: go test ./... -race

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long

      - name: Build and push Docker images
        run: |
          for service in activity gateway inventory order payment price refund task user; do
            if [ -f "deploy/docker/Dockerfile.${service}" ]; then
              image_name="${service}-service"
              if [ "${service}" = "gateway" ]; then
                image_name="gateway-api"
              fi
              docker build \
                --platform linux/amd64 \
                -t ${{ env.REGISTRY }}/${image_name}:${GITHUB_SHA} \
                -f deploy/docker/Dockerfile.${service} .
              docker push ${{ env.REGISTRY }}/${image_name}:${GITHUB_SHA}
            fi
          done

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Create staging namespace
        run: |
          kubectl create namespace ${{ env.STAGING_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMap and Secret
        run: |
          kubectl apply -f deploy/k8s/env/staging.yaml --namespace=${{ env.STAGING_NAMESPACE }}

      - name: Apply common resources (SA, NetworkPolicy, PDB)
        run: |
          kubectl apply -f deploy/k8s/common/ --namespace=${{ env.STAGING_NAMESPACE }}

      - name: Deploy services
        run: |
          # Update image in deployment and apply
          for svc in gateway order payment refund inventory user task activity price; do
            deployment_name="${svc}-service"
            image_name="${svc}-service"
            if [ "${svc}" = "gateway" ]; then
              deployment_name="gateway-api"
              image_name="gateway-api"
            fi

            # Update image and apply
            sed "s|your-registry/${image_name}:latest|${{ env.REGISTRY }}/${image_name}:${GITHUB_SHA }|g" \
              deploy/k8s/${deployment_name}.yaml | \
              kubectl apply -f - --namespace=${{ env.STAGING_NAMESPACE }}
          done

      - name: Wait for rollout
        run: |
          for svc in gateway order payment refund inventory user task activity price; do
            deployment_name="${svc}-service"
            if [ "${svc}" = "gateway" ]; then
              deployment_name="gateway-api"
            fi

            echo "Waiting for ${deployment_name} rollout..."
            kubectl rollout status deployment/${deployment_name} \
              --namespace=${{ env.STAGING_NAMESPACE }} \
              --timeout=300s || {
                echo "Rollout failed for ${deployment_name}"
                kubectl rollout undo deployment/${deployment_name} --namespace=${{ env.STAGING_NAMESPACE }}
                exit 1
              }
          done

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Wait for services to be ready
          sleep 10

          # Check gateway health
          GATEWAY_IP=$(kubectl get svc gateway-api -n ${{ env.STAGING_NAMESPACE }} -o jsonpath='{.spec.clusterIP}')
          if curl -sf "http://${GATEWAY_IP}:8080/health" > /dev/null; then
            echo "Gateway health check passed"
          else
            echo "Gateway health check failed"
            exit 1
          fi

          echo "Smoke tests passed"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Namespace: ${{ env.STAGING_NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "- Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Images: ${{ env.REGISTRY }}/<service>:${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY

          echo "### Pod Status" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.STAGING_NAMESPACE }} -o wide >> $GITHUB_STEP_SUMMARY 2>&1 || true
