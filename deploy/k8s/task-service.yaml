apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: your-registry/task-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: MYSQL_DSN
              value: "root:root@tcp(mysql:3306)/go_micro?parseTime=true&charset=utf8mb4&loc=Local"
            - name: MQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: INVENTORY_GRPC_TARGET
              value: "inventory-service:9082"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
spec:
  selector:
    app: task-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
  type: ClusterIP
